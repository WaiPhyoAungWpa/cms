services:
  postgres:
    image: postgres:18
    container_name: cms-postgres
    environment:
      POSTGRES_DB: cms_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - cms_postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: cms-api
    depends_on:
      - postgres
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=cms_dev;Username=postgres;Password=postgres
    ports:
      - "5000:8080"

  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: cms-frontend
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  cms_postgres_data:

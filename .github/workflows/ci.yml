name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - run: dotnet restore cms.slnx
      - run: dotnet build cms.slnx --configuration Release --no-restore
      - run: dotnet test cms.slnx --configuration Release --no-build --collect:"XPlat Code Coverage" --results-directory TestResults
      - name: Upload backend test results and coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: "**/TestResults/**"
          if-no-files-found: error

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: npm install
        working-directory: frontend
      - run: npm run build
        working-directory: frontend
